<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Salary — HRFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    @media print {
      .sidebar, .topbar, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; }
      .page-body { padding: 0 !important; }
      body { background: white !important; color: black !important; }
      .print-slip { color: black !important; }
      .print-slip * { color: black !important; background: white !important; border-color: #ccc !important; }
    }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title"> My Salary</div>
    </div>
    <div class="page-body">

      <div class="card" style="max-width:750px">
        <div class="section-header">
          <div class="card-title" style="margin-bottom:0"><span class="icon"></span> My Salary Slip</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <select id="sal-month" style="width:120px"></select>
            <select id="sal-year"  style="width:90px"></select>
            <button class="btn btn-primary btn-sm"   onclick="loadSalary()">View Slip</button>
            <button class="btn btn-secondary btn-sm no-print" id="csv-btn"   onclick="downloadCSV()" disabled>⬇ CSV</button>
            <button class="btn btn-secondary btn-sm no-print" id="print-btn" onclick="printSlip()"   disabled>🖨 Print</button>
          </div>
        </div>

        <div id="salary-slip" style="margin-top:12px">
          <div style="text-align:center;padding:40px;color:var(--white-dim)">Select month &amp; year, then click <strong>View Slip</strong></div>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/employee-sidebar.js"></script>
<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let myId = '';
let currentEmp = null;

document.addEventListener('DOMContentLoaded', () => {
  const user = requireEmployee();
  if (!user) return;
  myId = user._id;
  const now = new Date(), cy = now.getFullYear(), cm = now.getMonth() + 1;
  const mSel = document.getElementById('sal-month');
  const ySel = document.getElementById('sal-year');
  MONTHS.forEach((m, i) => mSel.innerHTML += `<option value="${i+1}" ${(i+1)===cm?'selected':''}>${m}</option>`);
  for (let y = cy; y >= cy - 3; y--) ySel.innerHTML += `<option value="${y}" ${y===cy?'selected':''}>${y}</option>`;
});

async function loadSalary() {
  const month = document.getElementById('sal-month').value;
  const year  = document.getElementById('sal-year').value;
  const slip  = document.getElementById('salary-slip');

  slip.innerHTML = '<div class="loader"></div>';
  currentEmp = null;
  document.getElementById('csv-btn').disabled   = true;
  document.getElementById('print-btn').disabled = true;

  try {
    const res = await api.get(`/reports/salary?month=${month}&year=${year}`);

    // Match logged-in employee from the results
    const emp = res.data.find(e =>
      String(e.employee_id) === String(myId) || e.employee_id === myId
    );

    if (!emp) {
      slip.innerHTML = `<div class="alert alert-info">ℹ No salary data for this month. Ensure attendance is recorded.</div>`;
      return;
    }

    currentEmp = emp;
    const monthName = MONTHS[parseInt(month) - 1];
    const perDay = parseFloat((emp.base_salary / emp.working_days).toFixed(2));

    slip.innerHTML = `
    <div class="print-slip" style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:4px">

      <!-- Header -->
      <div style="background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(100,100,255,0.08));padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:800">Salary Slip</div>
          <div style="color:var(--cyan);font-weight:600;margin-top:2px">${monthName} ${year}</div>
        </div>
        <div style="text-align:right;font-size:0.82rem;color:var(--white-dim)">
          Generated: ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
        </div>
      </div>

      <!-- Employee Info -->
      <div style="padding:16px 24px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${infoRow('Employee Name', emp.name)}
        ${infoRow('Department',    emp.department)}
        ${infoRow('Designation',   emp.designation)}
        ${infoRow('Working Days',  emp.working_days)}
        ${infoRow('Per Day Rate',  '₹' + perDay.toLocaleString('en-IN'))}
        ${infoRow('Pay Period',    monthName + ' ' + year)}
      </div>

      <!-- Attendance boxes -->
      <div style="padding:16px 24px;border-bottom:1px solid var(--border)">
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-dim);font-weight:700;margin-bottom:12px">📋 Attendance</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px;text-align:center">
          ${attBox(emp.days_present,      'Present',      'var(--green)')}
          ${attBox(emp.days_absent,       'Absent',       'var(--red)')}
          ${attBox(emp.days_half_day,     'Half Day',     'var(--amber)')}
          ${attBox(emp.days_on_leave,     'Paid Leave',   'var(--purple)')}
          ${attBox(emp.days_unpaid_leave, 'Unpaid Leave', 'var(--red)')}
        </div>
      </div>

      <!-- Earnings & Deductions -->
      <div style="padding:16px 24px;border-bottom:1px solid var(--border)">
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-dim);font-weight:700;margin-bottom:12px"> Earnings &amp; Deductions</div>
        <div style="display:flex;flex-direction:column;gap:0">
          ${salaryRow('Base / Gross Salary', fmtCurrency(emp.base_salary), '', true)}
          ${emp.absent_deduction   > 0 ? salaryRow('Absent Deduction (' + emp.days_absent + ' days × ₹' + perDay.toLocaleString('en-IN') + ')', fmtCurrency(emp.absent_deduction),   'var(--red)')   : ''}
          ${emp.half_day_deduction > 0 ? salaryRow('Half-day Deduction (' + emp.days_half_day + ' days × ₹' + (perDay/2).toFixed(0) + ')',     fmtCurrency(emp.half_day_deduction), 'var(--amber)') : ''}
          ${emp.unpaid_deduction   > 0 ? salaryRow('Unpaid Leave (' + emp.days_unpaid_leave + ' days × ₹' + perDay.toLocaleString('en-IN') + ')', fmtCurrency(emp.unpaid_deduction), 'var(--red)')   : ''}
          ${emp.total_deductions  === 0 ? '<div style="color:var(--green);font-size:0.84rem;padding:8px 0">✅ No deductions this month</div>' : ''}
        </div>
      </div>

      <!-- Total deductions bar -->
      <div style="padding:12px 24px;background:rgba(255,82,82,0.06);border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
        <span style="font-weight:600;color:var(--white-dim)">Total Deductions</span>
        <span style="font-weight:700;color:var(--red);font-size:1.05rem">− ${fmtCurrency(emp.total_deductions)}</span>
      </div>

      <!-- Net Salary -->
      <div style="padding:22px 24px;background:rgba(0,230,118,0.05);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-dim);font-weight:700">Net Salary (Take Home)</div>
          <div style="font-size:0.78rem;color:var(--white-dim);margin-top:4px">Gross − Deductions</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Sora',sans-serif;font-size:2.2rem;font-weight:800;color:var(--green)">${fmtCurrency(emp.net_salary)}</div>
          <div style="font-size:0.73rem;color:var(--white-dim);margin-top:2px">${monthName} ${year} payout</div>
        </div>
      </div>

    </div>`;

    document.getElementById('csv-btn').disabled   = false;
    document.getElementById('print-btn').disabled = false;

  } catch(err) {
    slip.innerHTML = `<div class="alert alert-error">⚠ ${err.message}</div>`;
  }
}

/* ── Helpers ── */
function infoRow(label, value) {
  return `<div>
    <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--white-dim);margin-bottom:3px">${label}</div>
    <div style="font-weight:600;font-size:0.88rem">${value}</div>
  </div>`;
}
function attBox(val, label, color) {
  return `<div style="padding:10px 6px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)">
    <div style="font-size:1.4rem;font-weight:800;color:${color}">${val}</div>
    <div style="font-size:0.68rem;color:var(--white-dim);margin-top:2px">${label}</div>
  </div>`;
}
function salaryRow(label, amount, color, bold) {
  const minus = color ? '− ' : '';
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
    <span style="font-size:0.86rem;${color?'color:'+color:''}">${label}</span>
    <span style="font-weight:${bold?'700':'600'};${color?'color:'+color:''}">${minus}${amount}</span>
  </div>`;
}

/* ── CSV Download ── */
function downloadCSV() {
  if (!currentEmp) { showToast('View a salary slip first', 'info'); return; }
  const month     = document.getElementById('sal-month').value;
  const year      = document.getElementById('sal-year').value;
  const monthName = MONTHS[parseInt(month) - 1];
  const perDay    = parseFloat((currentEmp.base_salary / currentEmp.working_days).toFixed(2));

  const rows = [
    ['SALARY SLIP', `${monthName} ${year}`],
    ['Generated On', new Date().toLocaleDateString('en-IN')],
    [],
    ['EMPLOYEE DETAILS', ''],
    ['Name',             currentEmp.name],
    ['Department',       currentEmp.department],
    ['Designation',      currentEmp.designation],
    ['Pay Period',       `${monthName} ${year}`],
    ['Per Day Rate (₹)', perDay],
    [],
    ['ATTENDANCE SUMMARY', ''],
    ['Working Days in Month', currentEmp.working_days],
    ['Days Present',          currentEmp.days_present],
    ['Days Absent',           currentEmp.days_absent],
    ['Half Days',             currentEmp.days_half_day],
    ['Paid Leave Days',       currentEmp.days_on_leave],
    ['Unpaid Leave Days',     currentEmp.days_unpaid_leave],
    [],
    ['SALARY DETAILS', ''],
    ['Gross / Base Salary (₹)',      currentEmp.base_salary],
    ['Absent Deduction (₹)',         currentEmp.absent_deduction],
    ['Half-day Deduction (₹)',       currentEmp.half_day_deduction],
    ['Unpaid Leave Deduction (₹)',   currentEmp.unpaid_deduction],
    ['Total Deductions (₹)',         currentEmp.total_deductions],
    [],
    ['NET SALARY (TAKE HOME ₹)',     currentEmp.net_salary],
  ];

  const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `Salary_Slip_${currentEmp.name.replace(/ /g,'_')}_${monthName}_${year}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV downloaded!', 'success');
}

/* ── Print ── */
function printSlip() {
  if (!currentEmp) { showToast('View a salary slip first', 'info'); return; }
  window.print();
}
</script>
</body>
</html>
