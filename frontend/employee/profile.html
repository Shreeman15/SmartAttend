<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Profile — HRFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">👤 My Profile</div>
    </div>
    <div class="page-body">
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;max-width:900px" id="profile-grid">
        <div class="loader"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/employee-sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user=requireEmployee();
  if (!user) return;
  try {
    const res=await api.get('/employees/'+user._id);
    const e=res.data;
    const initials=e.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('profile-grid').innerHTML=`
      <!-- Avatar card -->
      <div class="card" style="text-align:center">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--cyan-dim),#6464ff);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:2rem;margin:0 auto 16px">${initials}</div>
        <div style="font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700">${e.name}</div>
        <div style="color:var(--white-dim);font-size:0.85rem;margin-top:4px">${e.designation}</div>
        <div style="margin-top:12px"><span class="badge badge-approved">${e.is_active?'Active':'Inactive'}</span></div>
        <div style="margin-top:8px"><span class="badge" style="background:rgba(0,212,255,0.1);color:var(--cyan);text-transform:capitalize">${e.role}</span></div>
      </div>
      <!-- Details card -->
      <div class="card">
        <div class="card-title"><span class="icon">📋</span> Employee Details</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${field('Employee ID', String(e._id).slice(-8).toUpperCase())}
          ${field('Full Name', e.name)}
          ${field('Email', e.email)}
          ${field('Phone', e.phone||'—')}
          ${field('Department', e.department)}
          ${field('Designation', e.designation)}
          ${field('Base Salary', fmtCurrency(e.base_salary))}
          ${field('Date of Joining', fmtDate(e.joining_date))}
          ${field('Role', e.role.charAt(0).toUpperCase()+e.role.slice(1))}
          ${field('Status', e.is_active?'Active':'Inactive')}
        </div>
        <div style="margin-top:20px;padding:14px;background:rgba(0,212,255,0.04);border:1px solid var(--border);border-radius:8px">
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-dim);font-weight:700;margin-bottom:8px">📅 Date of Joining</div>
          <div style="font-size:1rem;font-weight:600;color:var(--cyan)">${fmtDate(e.joining_date)}</div>
          <div style="font-size:0.78rem;color:var(--white-dim);margin-top:4px">Leave requests before this date are not allowed.</div>
        </div>
      </div>`;
  } catch(err){document.getElementById('profile-grid').innerHTML=`<div class="alert alert-error" style="grid-column:1/-1">⚠ ${err.message}</div>`;}
});

function field(label, value) {
  return `<div>
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--white-dim);font-weight:700;margin-bottom:4px">${label}</div>
    <div style="font-size:0.9rem;font-weight:500">${value}</div>
  </div>`;
}
</script>
</body>
</html>
