<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Leaves — HRFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title"> My Leaves</div>
    </div>
    <div class="page-body">

      <!-- DOJ Banner — shown once DOJ is loaded -->
      <div id="doj-banner" style="display:none;margin-bottom:20px;padding:14px 20px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.25);border-radius:10px;display:none;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="font-size:1.4rem">📅</div>
        <div>
          <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-dim);font-weight:700">Your Date of Joining (DOJ)</div>
          <div id="doj-display" style="font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:800;color:var(--cyan);margin-top:2px">—</div>
        </div>
        <div style="margin-left:auto;padding:8px 16px;background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.25);border-radius:8px;font-size:0.8rem;color:var(--red);font-weight:600">
          ⛔ Leave before this date is not allowed
        </div>
      </div>

      <!-- Leave Balance -->
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin-bottom:0"><span class="icon">🧮</span> My Leave Balance</div>
          <div id="doj-mini" style="font-size:0.8rem;color:var(--white-dim)">Loading DOJ...</div>
        </div>
        <div id="balance-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px">
          <div class="loader"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-top:24px">
        <button class="tab-btn active" onclick="switchTab('apply')">📝 Apply Leave</button>
        <button class="tab-btn"        onclick="switchTab('history')">📜 My Leave History</button>
      </div>

      <!-- APPLY -->
      <div class="tab-content active" id="tab-apply">
        <div class="card">
          <div class="card-title"><span class="icon">📝</span> Apply for Leave</div>

          <!-- Inline DOJ reminder inside the form -->
          <div id="form-doj-note" style="display:none;margin-bottom:16px;padding:10px 16px;background:rgba(0,212,255,0.06);border-left:3px solid var(--cyan);border-radius:0 6px 6px 0;font-size:0.84rem">
            📅 Your DOJ: <strong id="form-doj-value" style="color:var(--cyan)">—</strong> &nbsp;·&nbsp; Leave requests before this date will be blocked.
          </div>

          <div id="apply-alert"></div>

          <div class="form-grid">
            <div class="form-group">
              <label>Leave Type *</label>
              <select id="apply-type" onchange="calcDays()">
                <option value="">— Select type —</option>
                <option value="Sick"> Sick Leave (max 10/yr)</option>
                <option value="Casual"> Casual Leave (max 12/yr)</option>
                <option value="Earned"> Earned Leave (max 15/yr)</option>
                <option value="Unpaid"> Unpaid Leave</option>
              </select>
            </div>
            <div class="form-group"><!-- spacer --></div>

            <div class="form-group">
              <label>
                Start Date *
                <span id="start-doj-hint" style="display:none;font-size:0.7rem;color:var(--cyan);margin-left:6px;font-weight:400">(earliest: <span id="start-doj-hint-val"></span>)</span>
              </label>
              <input type="date" id="apply-start" onchange="calcDays()"/>
              <div id="start-error" style="display:none;color:var(--red);font-size:0.78rem;margin-top:4px"></div>
            </div>

            <div class="form-group">
              <label>End Date *</label>
              <input type="date" id="apply-end" onchange="calcDays()"/>
              <div id="end-error" style="display:none;color:var(--red);font-size:0.78rem;margin-top:4px"></div>
            </div>

            <div class="form-group full">
              <label>Reason *</label>
              <textarea id="apply-reason" placeholder="Brief reason for leave..."></textarea>
            </div>
          </div>

          <!-- Days preview / DOJ block message -->
          <div id="days-preview" style="margin:10px 0 0;font-size:0.88rem"></div>

          <!-- Hard DOJ block banner — shown when date is before DOJ -->
          <div id="doj-block" style="display:none;margin-top:12px;padding:12px 16px;background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.35);border-radius:8px">
            <div style="font-weight:700;color:var(--red);margin-bottom:4px">⛔ Leave Not Allowed Before DOJ</div>
            <div id="doj-block-msg" style="font-size:0.84rem;color:var(--white-dim)"></div>
          </div>

          <button class="btn btn-primary" style="margin-top:16px" id="submit-btn" onclick="applyLeave()">📤 Submit Request</button>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="tab-content" id="tab-history">
        <div class="card">
          <div class="section-header">
            <div class="card-title" style="margin-bottom:0"><span class="icon">📜</span> My Leave History</div>
            <div style="display:flex;gap:8px">
              <select id="hist-year" style="width:90px" onchange="loadHistory()"></select>
              <select id="hist-status" style="width:110px" onchange="loadHistory()">
                <option value="">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>Type</th><th>Start</th><th>End</th><th>Days</th><th>Reason</th><th>Status</th><th>Approver Note</th></tr>
              </thead>
              <tbody id="history-tbody">
                <tr class="loading-row"><td colspan="7"><div class="loader"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/employee-sidebar.js"></script>
<script>
let myDOJ = '';
let myId  = '';
let dojBlocked = false; // tracks whether current dates are blocked

document.addEventListener('DOMContentLoaded', async () => {
  const user = requireEmployee();
  if (!user) return;
  myId = user._id;

  // Year dropdown
  const now = new Date(), cy = now.getFullYear();
  const ySel = document.getElementById('hist-year');
  for (let y = cy; y >= cy - 3; y--)
    ySel.innerHTML += `<option value="${y}" ${y===cy?'selected':''}>${y}</option>`;

  // Load employee record to get DOJ
  try {
    const res = await api.get('/employees/' + myId);
    const emp = res.data;
    myDOJ = (emp.joining_date || '').split('T')[0];

    if (myDOJ) {
      // Top banner
      document.getElementById('doj-banner').style.display  = 'flex';
      document.getElementById('doj-display').textContent   = fmtDate(myDOJ);
      // Mini label in balance card header
      document.getElementById('doj-mini').innerHTML =
        `📅 DOJ: <strong style="color:var(--cyan)">${fmtDate(myDOJ)}</strong>`;
      // Inside form
      document.getElementById('form-doj-note').style.display  = 'block';
      document.getElementById('form-doj-value').textContent   = fmtDate(myDOJ);
      // Hint below start date label
      document.getElementById('start-doj-hint').style.display = 'inline';
      document.getElementById('start-doj-hint-val').textContent = fmtDate(myDOJ);
      // Set min attribute so calendar greys out earlier dates
      document.getElementById('apply-start').min = myDOJ;
      document.getElementById('apply-end').min   = myDOJ;
    } else {
      document.getElementById('doj-mini').textContent = '';
    }
  } catch(e) {
    document.getElementById('doj-mini').textContent = '';
  }

  loadBalance();
  loadHistory();
});

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['apply','history'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadHistory();
}

function calcDays() {
  const start    = document.getElementById('apply-start').value;
  const end      = document.getElementById('apply-end').value;
  const preview  = document.getElementById('days-preview');
  const block    = document.getElementById('doj-block');
  const blockMsg = document.getElementById('doj-block-msg');
  const startErr = document.getElementById('start-error');
  const endErr   = document.getElementById('end-error');
  const submitBtn= document.getElementById('submit-btn');

  // Reset
  preview.textContent = '';
  block.style.display = 'none';
  startErr.style.display = 'none';
  endErr.style.display   = 'none';
  dojBlocked = false;
  submitBtn.disabled = false;

  if (!start && !end) return;

  // Check DOJ violation on start date
  if (start && myDOJ && start < myDOJ) {
    startErr.style.display = 'block';
    startErr.textContent   = `⛔ Start date cannot be before your DOJ (${fmtDate(myDOJ)})`;
    block.style.display    = 'block';
    blockMsg.innerHTML     = `Your Date of Joining is <strong style="color:var(--cyan)">${fmtDate(myDOJ)}</strong>. You cannot apply for leave before this date. Please select <strong>${fmtDate(myDOJ)}</strong> or later.`;
    dojBlocked  = true;
    submitBtn.disabled = true;
    preview.textContent = '';
    return;
  }

  // Check DOJ violation on end date
  if (end && myDOJ && end < myDOJ) {
    endErr.style.display = 'block';
    endErr.textContent   = `⛔ End date cannot be before your DOJ (${fmtDate(myDOJ)})`;
    dojBlocked  = true;
    submitBtn.disabled = true;
    return;
  }

  if (!start || !end) return;

  if (start > end) {
    preview.style.color = 'var(--red)';
    preview.textContent = '⚠ End date must be on or after start date';
    submitBtn.disabled  = true;
    return;
  }

  // Count working days (Mon–Fri)
  let count = 0;
  const cur = new Date(start), last = new Date(end);
  while (cur <= last) {
    const d = cur.getDay();
    if (d !== 0 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }

  if (count === 0) {
    preview.style.color = 'var(--amber)';
    preview.textContent = '⚠ Selected range has no working days (weekends only)';
    submitBtn.disabled  = true;
  } else {
    preview.style.color = 'var(--green)';
    preview.innerHTML   = `✅ <strong>${count}</strong> working day(s) selected (weekends excluded)`;
    submitBtn.disabled  = false;
  }
}

async function loadBalance() {
  const container = document.getElementById('balance-cards');
  container.innerHTML = '<div class="loader"></div>';
  try {
    const res  = await api.get('/leaves/balance/' + myId);
    const b    = res.data;
    const colors = { Sick:'red', Casual:'purple', Earned:'green', Unpaid:'amber' };
    const icons  = { Sick:'🤒', Casual:'🌴',      Earned:'🏆',    Unpaid:'💸'   };
    container.innerHTML = Object.entries(b).map(([type, info]) => `
      <div class="stat-card ${colors[type]}">
        <div class="stat-label">${icons[type]} ${type}</div>
        <div class="stat-value" style="font-size:1.6rem">${info.remaining === 'Unlimited' ? '∞' : info.remaining}</div>
        <div class="stat-sub">Used ${info.used} / ${info.allowed === 'Unlimited' ? '∞' : info.allowed}</div>
      </div>`).join('');
  } catch(err) {
    container.innerHTML = `<div class="alert alert-error">⚠ ${err.message}</div>`;
  }
}

async function applyLeave() {
  const alertBox = document.getElementById('apply-alert');
  alertBox.innerHTML = '';

  const type   = document.getElementById('apply-type').value;
  const start  = document.getElementById('apply-start').value;
  const end    = document.getElementById('apply-end').value;
  const reason = document.getElementById('apply-reason').value.trim();

  // Client-side guards
  if (!type || !start || !end || !reason) {
    alertBox.innerHTML = '<div class="alert alert-error">⚠ All fields are required</div>';
    return;
  }
  if (dojBlocked || (myDOJ && start < myDOJ)) {
    alertBox.innerHTML = `<div class="alert alert-error">
      ⛔ Cannot apply leave before your Date of Joining (<strong>${fmtDate(myDOJ)}</strong>)
    </div>`;
    return;
  }
  if (start > end) {
    alertBox.innerHTML = '<div class="alert alert-error">⚠ End date must be on or after start date</div>';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled    = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await api.post('/leaves/apply', {
      employee_id: myId,
      leave_type:  type,
      start_date:  start,
      end_date:    end,
      reason
    });
    alertBox.innerHTML = `<div class="alert alert-success">✅ ${res.message}</div>`;
    showToast('Leave request submitted!', 'success');
    // Reset form
    ['apply-type','apply-start','apply-end','apply-reason'].forEach(id =>
      document.getElementById(id).value = '');
    document.getElementById('days-preview').textContent = '';
    document.getElementById('doj-block').style.display  = 'none';
    loadBalance();
  } catch(err) {
    alertBox.innerHTML = `<div class="alert alert-error">⚠ ${err.message}</div>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = '📤 Submit Request';
  }
}

async function loadHistory() {
  const year   = document.getElementById('hist-year').value;
  const status = document.getElementById('hist-status').value;
  const tbody  = document.getElementById('history-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="7"><div class="loader"></div></td></tr>';

  const p = ['employee_id=' + myId];
  if (year)   p.push('year='   + year);
  if (status) p.push('status=' + status);

  try {
    const res = await api.get('/leaves?' + p.join('&'));
    if (!res.data.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--white-dim)">No leave records found</td></tr>';
      return;
    }
    tbody.innerHTML = res.data.map(l => `<tr>
      <td><span class="badge badge-pending">${l.leave_type}</span></td>
      <td>${fmtDate(l.start_date)}</td>
      <td>${fmtDate(l.end_date)}</td>
      <td>${l.total_days}d</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.reason}">${l.reason}</td>
      <td>${statusBadge(l.status)}</td>
      <td style="font-size:0.78rem;color:var(--white-dim)">${l.approver_note || '—'}</td>
    </tr>`).join('');
  } catch(err) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`;
  }
}
</script>
</body>
</html>
