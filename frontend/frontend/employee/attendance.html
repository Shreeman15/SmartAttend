<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Attendance — HRFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">📋 My Attendance</div>
    </div>
    <div class="page-body">

      <div id="punch-section"></div>
      <hr class="divider" style="margin:24px 0"/>

      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin-bottom:0"><span class="icon">📅</span> My Attendance History</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <select id="hist-month" style="width:120px">
              <option value="">All Months</option>
              <option value="1">January</option><option value="2">February</option>
              <option value="3">March</option><option value="4">April</option>
              <option value="5">May</option><option value="6">June</option>
              <option value="7">July</option><option value="8">August</option>
              <option value="9">September</option><option value="10">October</option>
              <option value="11">November</option><option value="12">December</option>
            </select>
            <select id="hist-year" style="width:90px"></select>
            <button class="btn btn-primary btn-sm" onclick="loadHistory()">Load</button>
          </div>
        </div>
        <div id="hist-summary" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Date</th><th>Day</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr></thead>
            <tbody id="hist-tbody"><tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/employee-sidebar.js"></script>
<script>
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

document.addEventListener('DOMContentLoaded', () => {
  requireEmployee();
  const now=new Date(), cy=now.getFullYear();
  const ySel=document.getElementById('hist-year');
  for(let y=cy;y>=cy-3;y--) ySel.innerHTML+=`<option value="${y}" ${y===cy?'selected':''}>${y}</option>`;
  document.getElementById('hist-month').value=String(now.getMonth()+1);
  renderPunchCard(); loadHistory();
});

async function renderPunchCard() {
  const section=document.getElementById('punch-section');
  try {
    const res=await api.get('/attendance/today-status');
    const rec=res.data;
    let sHtml='',bHtml='';
    if (!rec){sHtml=`<div class="punch-status text-dim">Not checked in yet</div>`;bHtml=`<button class="btn btn-primary btn-lg" onclick="punchIn()">🟢 Punch In</button>`;}
    else if (rec.check_in&&!rec.check_out){sHtml=`<div class="punch-status text-green">✅ In at <strong>${rec.check_in}</strong></div>`;bHtml=`<button class="btn btn-danger btn-lg" onclick="punchOut()">🔴 Punch Out</button>`;}
    else{sHtml=`<div class="punch-status">In: <strong class="text-green">${rec.check_in}</strong> | Out: <strong class="text-red">${rec.check_out}</strong> | ${rec.hours_worked}h | ${statusBadge(rec.status)}</div>`;bHtml=`<span class="badge badge-present" style="padding:10px 24px">✓ Day complete</span>`;}
    section.innerHTML=`<div class="punch-card">
      <div class="punch-time" id="live-clock">--:--:--</div>
      <div class="punch-date">${new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
      ${sHtml}<div class="punch-btns">${bHtml}</div></div>`;
    const tick=()=>{const el=document.getElementById('live-clock');if(el)el.textContent=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
    tick(); setInterval(tick,1000);
  } catch(err){section.innerHTML=`<div class="alert alert-error">⚠ ${err.message}</div>`;}
}

async function punchIn()  {try{const r=await api.post('/attendance/punch-in',{});showToast(r.message,'success');renderPunchCard();loadHistory();}catch(err){showToast(err.message,'error');}}
async function punchOut() {try{const r=await api.post('/attendance/punch-out',{});showToast(r.message,'success');renderPunchCard();loadHistory();}catch(err){showToast(err.message,'error');}}

async function loadHistory() {
  const month=document.getElementById('hist-month').value, year=document.getElementById('hist-year').value;
  const tbody=document.getElementById('hist-tbody');
  tbody.innerHTML='<tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr>';
  let url='/attendance/my-history'; const p=[];
  if(month) p.push('month='+month);
  if(year)  p.push('year='+year);
  if(p.length) url+='?'+p.join('&');
  try {
    const res=await api.get(url);
    const {data,summary}=res;
    document.getElementById('hist-summary').innerHTML=`
      <span class="badge badge-present">Present: ${summary.present}</span>
      <span class="badge badge-absent">Absent: ${summary.absent}</span>
      <span class="badge badge-halfday">Half-day: ${summary.half_day}</span>
      <span class="badge badge-leave">On Leave: ${summary.on_leave}</span>
      <span class="badge" style="background:rgba(0,212,255,0.1);color:var(--cyan)">Total: ${summary.total}</span>`;
    if (!data.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--white-dim)">No records found</td></tr>';return;}
    tbody.innerHTML=data.map(r=>{
      const d=new Date(r.date+'T00:00:00');
      return `<tr><td>${fmtDate(r.date)}</td><td style="color:var(--white-dim);font-size:0.8rem">${DAYS[d.getDay()]}</td>
        <td>${r.check_in||'—'}</td><td>${r.check_out||'—'}</td>
        <td>${r.hours_worked?r.hours_worked+'h':'—'}</td><td>${statusBadge(r.status)}</td></tr>`;
    }).join('');
  } catch(err){tbody.innerHTML=`<tr><td colspan="6"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`;}
}
</script>
</body>
</html>
