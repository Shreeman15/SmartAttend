<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Salary Report — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">💰 Salary Report</div>
      <div class="topbar-actions">
        <span style="background:rgba(255,152,0,0.15);color:#ff9800;padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:700">🔐 ADMIN</span>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin-bottom:0"><span class="icon">💰</span> Monthly Salary Breakdown</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <select id="sal-month" style="width:130px"></select>
            <select id="sal-year"  style="width:100px"></select>
            <button class="btn btn-primary btn-sm" onclick="loadSalary()">Generate</button>
            <button class="btn btn-secondary btn-sm" onclick="downloadCSV()">⬇ Download CSV</button>
          </div>
        </div>
        <div id="salary-totals" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px"></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Employee</th><th>Dept</th><th>Base</th><th>W.Days</th><th>Present</th><th>Absent</th><th>Half-day</th><th>Paid Leave</th><th>Unpaid</th><th>Deductions</th><th>Net Salary</th></tr>
            </thead>
            <tbody id="salary-tbody">
              <tr><td colspan="11" style="text-align:center;padding:40px;color:var(--white-dim)">Select month & year, then click Generate</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
let lastData = [];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

document.addEventListener('DOMContentLoaded', () => {
  requireAdmin();
  const now=new Date(), cy=now.getFullYear(), cm=now.getMonth()+1;
  const mSel=document.getElementById('sal-month'), ySel=document.getElementById('sal-year');
  MONTHS.forEach((m,i)=>mSel.innerHTML+=`<option value="${i+1}" ${(i+1)===cm?'selected':''}>${m}</option>`);
  for(let y=cy;y>=cy-3;y--) ySel.innerHTML+=`<option value="${y}" ${y===cy?'selected':''}>${y}</option>`;
});

async function loadSalary() {
  const month=document.getElementById('sal-month').value, year=document.getElementById('sal-year').value;
  const tbody=document.getElementById('salary-tbody');
  tbody.innerHTML='<tr class="loading-row"><td colspan="11"><div class="loader"></div></td></tr>';
  document.getElementById('salary-totals').innerHTML='';
  try {
    const res=await api.get(`/reports/salary?month=${month}&year=${year}`);
    lastData=res.data;
    if (!lastData.length) { tbody.innerHTML='<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--white-dim)">No data</td></tr>'; return; }
    const tb=lastData.reduce((s,e)=>s+e.base_salary,0), td=lastData.reduce((s,e)=>s+e.total_deductions,0), tn=lastData.reduce((s,e)=>s+e.net_salary,0);
    document.getElementById('salary-totals').innerHTML=`
      <div class="stat-card"><div class="stat-label">Gross Payout</div><div class="stat-value text-cyan" style="font-size:1.2rem">${fmtCurrency(tb)}</div></div>
      <div class="stat-card red"><div class="stat-label">Total Deductions</div><div class="stat-value text-red" style="font-size:1.2rem">${fmtCurrency(td)}</div></div>
      <div class="stat-card green"><div class="stat-label">Net Payout</div><div class="stat-value text-green" style="font-size:1.2rem">${fmtCurrency(tn)}</div></div>
      <div class="stat-card"><div class="stat-label">Employees</div><div class="stat-value text-cyan" style="font-size:1.2rem">${lastData.length}</div></div>`;
    tbody.innerHTML=lastData.map(e=>`<tr>
      <td><strong>${e.name}</strong><br><span style="font-size:0.72rem;color:var(--white-dim)">${e.designation}</span></td>
      <td>${e.department}</td><td>${fmtCurrency(e.base_salary)}</td>
      <td>${e.working_days}</td><td class="text-green">${e.days_present}</td>
      <td class="text-red">${e.days_absent}</td><td class="text-amber">${e.days_half_day}</td>
      <td style="color:var(--purple)">${e.days_on_leave}</td><td class="text-red">${e.days_unpaid_leave}</td>
      <td class="text-red"><strong>${fmtCurrency(e.total_deductions)}</strong></td>
      <td class="text-green"><strong>${fmtCurrency(e.net_salary)}</strong></td>
    </tr>`).join('');
  } catch(err) { tbody.innerHTML=`<tr><td colspan="11"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`; }
}

function downloadCSV() {
  if (!lastData.length) { showToast('Generate report first','info'); return; }
  const h=['Name','Dept','Designation','Base','Working Days','Present','Absent','Half-day','Paid Leave','Unpaid','Deductions','Net'];
  const rows=lastData.map(e=>[e.name,e.department,e.designation,e.base_salary,e.working_days,e.days_present,e.days_absent,e.days_half_day,e.days_on_leave,e.days_unpaid_leave,e.total_deductions,e.net_salary]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`salary_${document.getElementById('sal-month').value}_${document.getElementById('sal-year').value}.csv`;
  a.click(); showToast('CSV downloaded!','success');
}
</script>
</body>
</html>
