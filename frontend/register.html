<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — HRFlow</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">

<div class="auth-card wide">
  <div class="auth-logo">
    <div class="logo-icon">🏢</div>
    <div><h1>HRFlow</h1><span>Register New Employee</span></div>
  </div>

  <h2 class="auth-title">Create Account</h2>
  <p class="auth-sub">All fields required. DOJ prevents leave requests before joining date.</p>

  <div id="alert-box"></div>

  <form id="register-form">
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Arjun Sharma" required/>
      </div>
      <div class="form-group">
        <label>Work Email *</label>
        <input type="email" id="email" placeholder="arjun@company.com" required/>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="+91 98765 43210"/>
      </div>
      <div class="form-group">
        <label>Department *</label>
        <select id="department" required>
          <option value="">— Select —</option>
          <option>Engineering</option><option>HR</option><option>Finance</option>
          <option>Marketing</option><option>Operations</option><option>Sales</option>
        </select>
      </div>
      <div class="form-group">
        <label>Designation *</label>
        <input type="text" id="designation" placeholder="Software Engineer" required/>
      </div>
      <div class="form-group">
        <label>Base Salary (₹/month) *</label>
        <input type="number" id="base_salary" placeholder="60000" required min="1000"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="employee">Employee</option>
          <option value="manager">Manager</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Date of Joining (DOJ) *</label>
        <input type="date" id="joining_date" required/>
        <small style="color:var(--white-dim);font-size:0.75rem;display:block;margin-top:4px">
          ⚠ Employee cannot apply leave before this date. Stored permanently.
        </small>
      </div>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
      <button type="submit" class="btn btn-primary btn-lg" id="register-btn">✅ Register Employee</button>
      <a href="login.html" class="btn btn-secondary btn-lg">← Back to Login</a>
    </div>
  </form>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
  document.getElementById('joining_date').value = new Date().toISOString().split('T')[0];

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('register-btn');
    const alertBox = document.getElementById('alert-box');
    alertBox.innerHTML = '';
    btn.disabled    = true;
    btn.textContent = 'Registering...';
    try {
      const data = await api.post('/auth/register', {
        name:         document.getElementById('name').value.trim(),
        email:        document.getElementById('email').value.trim(),
        password:     document.getElementById('password').value,
        phone:        document.getElementById('phone').value.trim(),
        department:   document.getElementById('department').value,
        designation:  document.getElementById('designation').value.trim(),
        base_salary:  parseFloat(document.getElementById('base_salary').value),
        joining_date: document.getElementById('joining_date').value,
        role:         document.getElementById('role').value
      });
      alertBox.innerHTML = `<div class="alert alert-success">✅ ${data.employee.name} registered! Redirecting to login...</div>`;
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">⚠ ${err.message}</div>`;
      btn.disabled    = false;
      btn.textContent = '✅ Register Employee';
    }
  });
</script>
</body>
</html>
