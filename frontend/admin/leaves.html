<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Leave Approvals — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">🌿 Leave Approvals</div>
      <div class="topbar-actions">
        <span style="background:rgba(255,152,0,0.15);color:#ff9800;padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:700">🔐 ADMIN</span>
      </div>
    </div>
    <div class="page-body">

      <!-- Stats -->
      <div class="stats-grid" id="leave-stats" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
        <div class="stat-card"><div class="loader"></div></div>
        <div class="stat-card"><div class="loader"></div></div>
        <div class="stat-card"><div class="loader"></div></div>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-top:24px">
        <button class="tab-btn active" onclick="switchTab('pending')">⏳ Pending</button>
        <button class="tab-btn"        onclick="switchTab('approved')">✅ Approved</button>
        <button class="tab-btn"        onclick="switchTab('rejected')">❌ Rejected</button>
        <button class="tab-btn"        onclick="switchTab('all')">📋 All Leaves</button>
      </div>

      <div class="card">
        <!-- Filters -->
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
          <select id="filter-emp" style="width:210px" onchange="loadLeaves()"></select>
          <select id="filter-year" style="width:100px" onchange="loadLeaves()"></select>
          <input type="text" id="search-leave" placeholder="Search employee..." style="width:160px" oninput="filterTable()"/>
          <span id="result-count" style="font-size:0.82rem;color:var(--white-dim);margin-left:auto"></span>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Employee</th>
                <th>DOJ</th>
                <th>Type</th>
                <th>Start</th>
                <th>End</th>
                <th>Days</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Applied On</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="leaves-tbody">
              <tr class="loading-row"><td colspan="10"><div class="loader"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
let currentStatus = 'Pending';
let allLeaves     = [];
let empDOJMap     = {}; // employee_id -> DOJ string

document.addEventListener('DOMContentLoaded', async () => {
  requireAdmin();

  // Load employee list + build DOJ map
  try {
    const res = await api.get('/employees');
    res.data.forEach(e => {
      empDOJMap[e._id] = (e.joining_date || '').split('T')[0];
    });
  } catch(e) {}

  await populateEmployeeDropdown('filter-emp', true);

  const curYear = new Date().getFullYear();
  const ys = document.getElementById('filter-year');
  for (let y = curYear; y >= curYear - 3; y--)
    ys.innerHTML += `<option value="${y}" ${y===curYear?'selected':''}>${y}</option>`;

  loadLeaveStats();
  loadLeaves();
});

function switchTab(status) {
  currentStatus = status === 'all' ? '' : status.charAt(0).toUpperCase() + status.slice(1);
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['pending','approved','rejected','all'][i] === status));
  loadLeaves();
}

async function loadLeaveStats() {
  try {
    const [p, a, r] = await Promise.all([
      api.get('/leaves?status=Pending'),
      api.get('/leaves?status=Approved'),
      api.get('/leaves?status=Rejected')
    ]);
    document.getElementById('leave-stats').innerHTML = `
      <div class="stat-card amber"><div class="stat-label">Pending</div><div class="stat-value text-amber">${p.data.length}</div><div class="stat-sub">Need action</div></div>
      <div class="stat-card green"><div class="stat-label">Approved</div><div class="stat-value text-green">${a.data.length}</div><div class="stat-sub">This year</div></div>
      <div class="stat-card red"><div class="stat-label">Rejected</div><div class="stat-value text-red">${r.data.length}</div><div class="stat-sub">This year</div></div>`;
  } catch(e) {}
}

async function loadLeaves() {
  const empId = document.getElementById('filter-emp').value;
  const year  = document.getElementById('filter-year').value;
  const tbody = document.getElementById('leaves-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="10"><div class="loader"></div></td></tr>';

  const p = [];
  if (empId)         p.push('employee_id=' + empId);
  if (year)          p.push('year='   + year);
  if (currentStatus) p.push('status=' + currentStatus);

  try {
    const res = await api.get('/leaves' + (p.length ? '?' + p.join('&') : ''));
    allLeaves = res.data;
    renderLeaves(allLeaves);
  } catch(err) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`;
  }
}

function filterTable() {
  const s = document.getElementById('search-leave').value.toLowerCase();
  renderLeaves(s ? allLeaves.filter(l => l.employee_name.toLowerCase().includes(s)) : allLeaves);
}

function renderLeaves(data) {
  const tbody = document.getElementById('leaves-tbody');
  document.getElementById('result-count').textContent = `${data.length} record(s)`;

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--white-dim)">No records found</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(l => {
    const isPending = l.status === 'Pending';
    const empId     = String(l.employee_id || '');
    const doj       = empDOJMap[empId] || '';

    // Check if this leave starts before DOJ (data integrity flag)
    const dojViolation = doj && l.start_date && l.start_date.split('T')[0] < doj;

    return `<tr ${dojViolation ? 'style="background:rgba(255,82,82,0.05)"' : ''}>
      <td>
        <strong>${l.employee_name}</strong><br>
        <span style="font-size:0.75rem;color:var(--white-dim)">${l.department}</span>
      </td>
      <td>
        ${doj
          ? `<span style="font-size:0.78rem;color:var(--cyan);font-weight:600">${fmtDate(doj)}</span>
             ${dojViolation ? '<br><span style="font-size:0.7rem;color:var(--red);font-weight:700">⛔ BEFORE DOJ</span>' : ''}`
          : '<span style="color:var(--white-dim);font-size:0.78rem">—</span>'
        }
      </td>
      <td><span class="badge badge-pending">${l.leave_type}</span></td>
      <td style="${dojViolation?'color:var(--red);font-weight:700':''}">${fmtDate(l.start_date)}</td>
      <td>${fmtDate(l.end_date)}</td>
      <td>${l.total_days}d</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.reason}">${l.reason}</td>
      <td>${statusBadge(l.status)}</td>
      <td style="font-size:0.75rem;color:var(--white-dim)">${fmtDate(l.created_at)}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${isPending
            ? `<button class="btn btn-success btn-sm" onclick="actionLeave('${l.id}','approve')" ${dojViolation?'style="opacity:0.5"':''}>✓</button>
               <button class="btn btn-danger btn-sm"  onclick="actionLeave('${l.id}','reject')">✕</button>`
            : `<span style="font-size:0.75rem;color:var(--white-dim);max-width:110px;overflow:hidden;text-overflow:ellipsis">${l.approver_note || '—'}</span>`
          }
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function actionLeave(id, action) {
  const note = action === 'approve'
    ? (prompt('Approval note (optional):') || 'Approved by admin')
    : (prompt('Rejection reason:') || 'Rejected by admin');
  try {
    const r = await api.put(`/leaves/${id}/${action}`, { approver_note: note });
    showToast(r.message, action === 'approve' ? 'success' : 'info');
    loadLeaves();
    loadLeaveStats();
  } catch(err) {
    showToast(err.message, 'error');
  }
}
</script>
</body>
</html>
