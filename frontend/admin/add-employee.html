<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Add Employee — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">➕ Add New Employee</div>
      <div class="topbar-actions">
        <span style="background:rgba(255,152,0,0.15);color:#ff9800;padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:700">🔐 ADMIN</span>
      </div>
    </div>
    <div class="page-body">
      <div class="card" style="max-width:700px">
        <div class="card-title"><span class="icon">➕</span> Register New Employee</div>
        <div id="alert-box"></div>
        <div class="form-grid">
          <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Arjun Sharma" required/></div>
          <div class="form-group"><label>Work Email *</label><input type="email" id="email" placeholder="arjun@company.com" required/></div>
          <div class="form-group"><label>Password *</label><input type="password" id="password" value="Hr@1234" required minlength="6"/></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+91 98765 43210"/></div>
          <div class="form-group">
            <label>Department *</label>
            <select id="department" required>
              <option value="">— Select —</option>
              <option>Engineering</option><option>HR</option><option>Finance</option>
              <option>Marketing</option><option>Operations</option><option>Sales</option>
            </select>
          </div>
          <div class="form-group"><label>Designation *</label><input type="text" id="designation" placeholder="Software Engineer" required/></div>
          <div class="form-group"><label>Base Salary (₹/month) *</label><input type="number" id="base_salary" placeholder="60000" required min="1000"/></div>
          <div class="form-group">
            <label>Role</label>
            <select id="role">
              <option value="employee">Employee</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Date of Joining (DOJ) *</label>
            <input type="date" id="joining_date" required/>
            <small style="color:var(--white-dim);font-size:0.75rem;display:block;margin-top:4px">⚠ Employee cannot apply leave before this date.</small>
          </div>
        </div>
        <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary btn-lg" id="register-btn" onclick="registerEmployee()">✅ Register Employee</button>
          <a href="employees.html" class="btn btn-secondary btn-lg">← Back to List</a>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  requireAdmin();
  document.getElementById('joining_date').value = new Date().toISOString().split('T')[0];
});

async function registerEmployee() {
  const btn = document.getElementById('register-btn');
  const alertBox = document.getElementById('alert-box');
  alertBox.innerHTML = '';
  btn.disabled = true; btn.textContent = 'Registering...';
  try {
    const data = await api.post('/auth/register', {
      name:         document.getElementById('name').value.trim(),
      email:        document.getElementById('email').value.trim(),
      password:     document.getElementById('password').value,
      phone:        document.getElementById('phone').value.trim(),
      department:   document.getElementById('department').value,
      designation:  document.getElementById('designation').value.trim(),
      base_salary:  parseFloat(document.getElementById('base_salary').value),
      joining_date: document.getElementById('joining_date').value,
      role:         document.getElementById('role').value
    });
    alertBox.innerHTML = `<div class="alert alert-success">✅ ${data.employee.name} registered successfully!</div>`;
    showToast('Employee added!','success');
    // Reset form
    ['name','email','phone','designation','base_salary'].forEach(id => document.getElementById(id).value='');
    document.getElementById('department').value='';
    document.getElementById('role').value='employee';
    document.getElementById('password').value='Hr@1234';
  } catch(err) {
    alertBox.innerHTML = `<div class="alert alert-error">⚠ ${err.message}</div>`;
  }
  btn.disabled=false; btn.textContent='✅ Register Employee';
}
</script>
</body>
</html>
