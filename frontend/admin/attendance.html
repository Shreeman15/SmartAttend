<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Attendance — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">📋 Attendance Management</div>
      <div class="topbar-actions">
        <span style="background:rgba(255,152,0,0.15);color:#ff9800;padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:700">🔐 ADMIN</span>
      </div>
    </div>
    <div class="page-body">

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">📆 Daily View</button>
        <button class="tab-btn"        onclick="switchTab('monthly')">📅 Monthly View</button>
        <button class="tab-btn"        onclick="switchTab('mark')">✏️ Mark / Edit</button>
      </div>

      <!-- DAILY VIEW -->
      <div class="tab-content active" id="tab-daily">
        <div class="card">
          <div class="section-header">
            <div class="card-title" style="margin-bottom:0"><span class="icon">📆</span> All Employees — Daily</div>
            <div style="display:flex;gap:8px">
              <input type="date" id="daily-date" style="width:160px"/>
              <button class="btn btn-primary btn-sm" onclick="loadDailyView()">View</button>
            </div>
          </div>
          <div id="daily-summary" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Employee</th><th>Department</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr></thead>
              <tbody id="daily-tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--white-dim)">Select date and click View</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- MONTHLY VIEW -->
      <div class="tab-content" id="tab-monthly">
        <div class="card">
          <div class="section-header">
            <div class="card-title" style="margin-bottom:0"><span class="icon">📅</span> Employee Monthly Report</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <select id="monthly-emp" style="width:200px"></select>
              <select id="monthly-month" style="width:120px"></select>
              <select id="monthly-year"  style="width:90px"></select>
              <button class="btn btn-primary btn-sm" onclick="loadMonthly()">Load</button>
            </div>
          </div>
          <div id="monthly-summary" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Date</th><th>Day</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr></thead>
              <tbody id="monthly-tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--white-dim)">Select employee & month</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- MARK / EDIT -->
      <div class="tab-content" id="tab-mark">
        <div class="card">
          <div class="card-title"><span class="icon">✏️</span> Mark / Edit Attendance</div>
          <div id="mark-alert"></div>
          <div class="form-grid">
            <div class="form-group"><label>Employee *</label><select id="mark-emp"></select></div>
            <div class="form-group"><label>Date *</label><input type="date" id="mark-date"/></div>
            <div class="form-group"><label>Check In</label><input type="time" id="mark-checkin"/></div>
            <div class="form-group"><label>Check Out</label><input type="time" id="mark-checkout"/></div>
            <div class="form-group">
              <label>Status *</label>
              <select id="mark-status">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
                <option value="Half-day">Half-day</option>
                <option value="On Leave">On Leave</option>
              </select>
            </div>
            <div class="form-group"><label>Note</label><input type="text" id="mark-note" placeholder="Optional note"/></div>
          </div>
          <button class="btn btn-primary" style="margin-top:16px" onclick="markAttendance()">✅ Save Attendance</button>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

document.addEventListener('DOMContentLoaded', async () => {
  requireAdmin();
  const now = new Date(), curYear=now.getFullYear(), curMonth=now.getMonth()+1;
  document.getElementById('daily-date').value = now.toISOString().split('T')[0];
  document.getElementById('mark-date').value  = now.toISOString().split('T')[0];

  const mSel = document.getElementById('monthly-month');
  MONTHS.forEach((m,i) => mSel.innerHTML+=`<option value="${i+1}" ${(i+1)===curMonth?'selected':''}>${m}</option>`);
  const ySel = document.getElementById('monthly-year');
  for(let y=curYear;y>=curYear-3;y--) ySel.innerHTML+=`<option value="${y}" ${y===curYear?'selected':''}>${y}</option>`;

  await populateEmployeeDropdown('monthly-emp', false);
  await populateEmployeeDropdown('mark-emp', false);
  loadDailyView();
});

function switchTab(name) {
  const tabs=['daily','monthly','mark'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

async function loadDailyView() {
  const date = document.getElementById('daily-date').value;
  if (!date) { showToast('Select a date','info'); return; }
  const tbody = document.getElementById('daily-tbody');
  tbody.innerHTML='<tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr>';
  try {
    const res  = await api.get('/attendance/daily?date='+date);
    const data = res.data;
    const p=data.filter(r=>r.status==='Present').length, a=data.filter(r=>r.status==='Absent').length,
          h=data.filter(r=>r.status==='Half-day').length, l=data.filter(r=>r.status==='On Leave').length;
    document.getElementById('daily-summary').innerHTML=`
      <span class="badge badge-present">Present: ${p}</span>
      <span class="badge badge-absent">Absent: ${a}</span>
      <span class="badge badge-halfday">Half-day: ${h}</span>
      <span class="badge badge-leave">On Leave: ${l}</span>`;
    tbody.innerHTML = data.map(r=>`<tr>
      <td><strong>${r.name}</strong></td><td>${r.department}</td>
      <td>${r.check_in||'—'}</td><td>${r.check_out||'—'}</td>
      <td>${r.hours_worked?r.hours_worked+'h':'—'}</td><td>${statusBadge(r.status)}</td>
    </tr>`).join('');
  } catch(err) { tbody.innerHTML=`<tr><td colspan="6"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`; }
}

async function loadMonthly() {
  const empId = document.getElementById('monthly-emp').value;
  const month = document.getElementById('monthly-month').value;
  const year  = document.getElementById('monthly-year').value;
  if (!empId) { showToast('Select an employee','info'); return; }
  const tbody = document.getElementById('monthly-tbody');
  tbody.innerHTML='<tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr>';
  try {
    const res = await api.get(`/attendance?employee_id=${empId}&month=${month}&year=${year}`);
    const { data, summary } = res;
    document.getElementById('monthly-summary').innerHTML=`
      <span class="badge badge-present">Present: ${summary.present}</span>
      <span class="badge badge-absent">Absent: ${summary.absent}</span>
      <span class="badge badge-halfday">Half-day: ${summary.half_day}</span>
      <span class="badge badge-leave">On Leave: ${summary.on_leave}</span>
      <span class="badge" style="background:rgba(0,212,255,0.1);color:var(--cyan)">Total: ${summary.total}</span>`;
    if (!data.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--white-dim)">No records</td></tr>'; return; }
    tbody.innerHTML = data.map(r=>{
      const d=new Date(r.date+'T00:00:00');
      return `<tr><td>${fmtDate(r.date)}</td><td style="color:var(--white-dim);font-size:0.8rem">${DAYS[d.getDay()]}</td>
        <td>${r.check_in||'—'}</td><td>${r.check_out||'—'}</td>
        <td>${r.hours_worked?r.hours_worked+'h':'—'}</td><td>${statusBadge(r.status)}</td></tr>`;
    }).join('');
  } catch(err) { tbody.innerHTML=`<tr><td colspan="6"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`; }
}

async function markAttendance() {
  const alertBox = document.getElementById('mark-alert');
  alertBox.innerHTML='';
  const payload = {
    employee_id: document.getElementById('mark-emp').value,
    date:        document.getElementById('mark-date').value,
    check_in:    document.getElementById('mark-checkin').value||null,
    check_out:   document.getElementById('mark-checkout').value||null,
    status:      document.getElementById('mark-status').value,
    note:        document.getElementById('mark-note').value
  };
  if (!payload.employee_id || !payload.date) { alertBox.innerHTML='<div class="alert alert-error">Employee and date required</div>'; return; }
  try {
    const res = await api.post('/attendance', payload);
    alertBox.innerHTML=`<div class="alert alert-success">✅ ${res.message}</div>`;
    showToast('Attendance saved!','success');
  } catch(err) { alertBox.innerHTML=`<div class="alert alert-error">⚠ ${err.message}</div>`; }
}
</script>
</body>
</html>
