<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Dashboard — HRFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout" id="app-layout">
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">📊 Admin Dashboard</div>
      <div class="topbar-actions">
        <span style="background:rgba(255,152,0,0.15);color:#ff9800;padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:700">🔐 ADMIN</span>
        <span id="topbar-date" style="font-size:0.82rem;color:var(--white-dim);margin-left:12px"></span>
      </div>
    </div>
    <div class="page-body">

      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="loader"></div></div>
        <div class="stat-card"><div class="loader"></div></div>
        <div class="stat-card"><div class="loader"></div></div>
        <div class="stat-card"><div class="loader"></div></div>
      </div>

      <div class="grid-2" style="margin-top:24px">
        <div class="card">
          <div class="card-title"><span class="icon">📈</span> Monthly Attendance Trend</div>
          <canvas id="trendChart" height="200"></canvas>
        </div>
        <div class="card">
          <div class="card-title"><span class="icon">🗓</span> Today's Attendance</div>
          <div id="today-list"><div class="loader"></div></div>
        </div>
      </div>

      <div class="card" style="margin-top:24px">
        <div class="section-header">
          <div class="card-title" style="margin-bottom:0"><span class="icon">⏳</span> Pending Leave Approvals</div>
          <a href="leaves.html" class="btn btn-secondary btn-sm">Manage All →</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Reason</th><th>Actions</th></tr></thead>
            <tbody id="pending-tbody"><tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAdmin();
  if (!user) return;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  loadStats(); loadTodayList(); loadPendingLeaves();
});

async function loadStats() {
  try {
    const res = await api.get('/dashboard/summary');
    const d   = res.data;
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-value text-cyan">${d.total_employees}</div><div class="stat-sub">Active staff</div><div class="stat-icon">👥</div></div>
      <div class="stat-card green"><div class="stat-label">Present Today</div><div class="stat-value text-green">${d.present_today}</div><div class="stat-sub">Checked in</div><div class="stat-icon">✅</div></div>
      <div class="stat-card purple"><div class="stat-label">On Leave Today</div><div class="stat-value" style="color:var(--purple)">${d.on_leave_today}</div><div class="stat-sub">Approved</div><div class="stat-icon">🌿</div></div>
      <div class="stat-card amber"><div class="stat-label">Pending Approvals</div><div class="stat-value text-amber">${d.pending_approvals}</div><div class="stat-sub">Need action</div><div class="stat-icon">⏳</div></div>`;
    if (d.trend && d.trend.length) {
      new Chart(document.getElementById('trendChart'),{
        type:'line',
        data:{labels:d.trend.map(t=>t.label),datasets:[
          {label:'Present',data:d.trend.map(t=>t.present),borderColor:'#00e676',backgroundColor:'rgba(0,230,118,0.1)',tension:0.4,fill:true},
          {label:'Absent', data:d.trend.map(t=>t.absent), borderColor:'#ff5252',backgroundColor:'rgba(255,82,82,0.1)', tension:0.4,fill:true}
        ]},
        options:{plugins:{legend:{labels:{color:'#8899aa'}}},scales:{x:{ticks:{color:'#8899aa'},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#8899aa'},grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true}}}
      });
    }
  } catch(err) { document.getElementById('stats-grid').innerHTML=`<div class="alert alert-error" style="grid-column:1/-1">⚠ ${err.message}</div>`; }
}

async function loadTodayList() {
  const today = new Date().toISOString().split('T')[0];
  const list  = document.getElementById('today-list');
  try {
    const res = await api.get('/attendance/daily?date='+today);
    if (!res.data.length) { list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>No records yet</p></div>'; return; }
    list.innerHTML=`<div class="table-wrapper"><table>
      <thead><tr><th>Name</th><th>Dept</th><th>In</th><th>Status</th></tr></thead>
      <tbody>${res.data.slice(0,8).map(r=>`<tr><td>${r.name}</td><td style="font-size:0.75rem;color:var(--white-dim)">${r.department}</td><td>${r.check_in||'—'}</td><td>${statusBadge(r.status)}</td></tr>`).join('')}</tbody>
    </table></div>`;
  } catch(err) { list.innerHTML=`<div class="alert alert-error">⚠ ${err.message}</div>`; }
}

async function loadPendingLeaves() {
  const tbody = document.getElementById('pending-tbody');
  try {
    const res = await api.get('/leaves?status=Pending');
    if (!res.data.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--white-dim)">No pending approvals 🎉</td></tr>'; return; }
    tbody.innerHTML = res.data.map(l=>`<tr>
      <td><strong>${l.employee_name}</strong><br><span style="font-size:0.75rem;color:var(--white-dim)">${l.department}</span></td>
      <td><span class="badge badge-pending">${l.leave_type}</span></td>
      <td>${fmtDate(l.start_date)} → ${fmtDate(l.end_date)}</td>
      <td>${l.total_days}d</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.reason}">${l.reason}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-success btn-sm" onclick="approveLeave('${l.id}')">✓ Approve</button>
        <button class="btn btn-danger btn-sm"  onclick="rejectLeave('${l.id}')">✕ Reject</button>
      </td>
    </tr>`).join('');
  } catch(err) { tbody.innerHTML=`<tr><td colspan="6"><div class="alert alert-error">⚠ ${err.message}</div></td></tr>`; }
}

async function approveLeave(id) {
  try { const r=await api.put(`/leaves/${id}/approve`,{approver_note:'Approved by admin'}); showToast(r.message,'success'); loadPendingLeaves(); loadStats(); }
  catch(err) { showToast(err.message,'error'); }
}
async function rejectLeave(id) {
  const note = prompt('Rejection reason:') || 'Rejected by admin';
  try { const r=await api.put(`/leaves/${id}/reject`,{approver_note:note}); showToast(r.message,'info'); loadPendingLeaves(); loadStats(); }
  catch(err) { showToast(err.message,'error'); }
}
</script>
</body>
</html>
